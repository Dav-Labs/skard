<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Vibrant diagonal gradient background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="35%" stop-color="#7c3aed"/>
      <stop offset="70%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>

    <!-- Card art gradient (rich warm tones to suggest artwork) -->
    <linearGradient id="cardArt" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="30%" stop-color="#ef4444"/>
      <stop offset="60%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>

    <!-- Card border gradient (gold frame) -->
    <linearGradient id="cardFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>

    <!-- Scan line glow -->
    <linearGradient id="scanLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="30%" stop-color="#38bdf8" stop-opacity="1"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="70%" stop-color="#38bdf8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>

    <!-- Scan line outer glow -->
    <filter id="scanGlow" x="-20%" y="-300%" width="140%" height="700%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Bracket glow -->
    <filter id="bracketGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip for card art -->
    <clipPath id="cardClip">
      <rect x="166" y="126" width="180" height="260" rx="8"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle inner shadow/depth -->
  <rect width="512" height="512" rx="108" fill="url(#bg)" opacity="0.3"/>

  <!-- Card with gold frame -->
  <rect x="158" y="118" width="196" height="276" rx="12" fill="url(#cardFrame)"/>

  <!-- Card art area -->
  <g clip-path="url(#cardClip)">
    <rect x="166" y="126" width="180" height="260" fill="url(#cardArt)"/>
    <!-- Stylized art details (abstract dragon/fire shapes) -->
    <ellipse cx="280" cy="200" rx="70" ry="60" fill="#f97316" opacity="0.6"/>
    <ellipse cx="240" cy="230" rx="50" ry="80" fill="#dc2626" opacity="0.5"/>
    <ellipse cx="260" cy="180" rx="40" ry="50" fill="#fbbf24" opacity="0.5"/>
    <ellipse cx="230" cy="260" rx="60" ry="40" fill="#7c2d12" opacity="0.4"/>
    <!-- Dark bottom area (text box feel) -->
    <rect x="166" y="310" width="180" height="76" fill="#1e1b4b" opacity="0.8"/>
    <!-- Mana cost circle -->
    <circle cx="330" cy="140" r="14" fill="#1e1b4b" opacity="0.7"/>
    <text x="330" y="146" text-anchor="middle" font-family="system-ui" font-weight="700" font-size="16" fill="white">S</text>
  </g>

  <!-- Scan line with glow -->
  <rect x="110" y="254" width="292" height="4" rx="2" fill="url(#scanLine)" filter="url(#scanGlow)"/>

  <!-- Corner scan brackets (thick, glowing) -->
  <g filter="url(#bracketGlow)">
    <!-- Top-left -->
    <path d="M130 188 L130 148 Q130 120 158 120 L198 120" fill="none" stroke="#38bdf8" stroke-width="10" stroke-linecap="round"/>
    <!-- Top-right -->
    <path d="M382 188 L382 148 Q382 120 354 120 L314 120" fill="none" stroke="#38bdf8" stroke-width="10" stroke-linecap="round"/>
    <!-- Bottom-left -->
    <path d="M130 324 L130 364 Q130 392 158 392 L198 392" fill="none" stroke="#38bdf8" stroke-width="10" stroke-linecap="round"/>
    <!-- Bottom-right -->
    <path d="M382 324 L382 364 Q382 392 354 392 L314 392" fill="none" stroke="#38bdf8" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
