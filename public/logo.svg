<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c4b5fd" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Card shape (subtle, centered) -->
  <rect x="156" y="96" width="200" height="280" rx="12" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="6"/>

  <!-- Stylized S letterform -->
  <text x="256" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="260" fill="white" letter-spacing="-8">S</text>

  <!-- Scan line across the card -->
  <rect x="136" y="244" width="240" height="3" rx="1.5" fill="url(#scan)"/>

  <!-- Corner bracket marks (scan UI feel) -->
  <!-- Top-left -->
  <path d="M156 130 L156 110 Q156 96 170 96 L190 96" fill="none" stroke="#a78bfa" stroke-width="5" stroke-linecap="round"/>
  <!-- Top-right -->
  <path d="M356 130 L356 110 Q356 96 342 96 L322 96" fill="none" stroke="#a78bfa" stroke-width="5" stroke-linecap="round"/>
  <!-- Bottom-left -->
  <path d="M156 342 L156 362 Q156 376 170 376 L190 376" fill="none" stroke="#a78bfa" stroke-width="5" stroke-linecap="round"/>
  <!-- Bottom-right -->
  <path d="M356 342 L356 362 Q356 376 342 376 L322 376" fill="none" stroke="#a78bfa" stroke-width="5" stroke-linecap="round"/>
</svg>
